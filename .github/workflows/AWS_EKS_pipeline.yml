name: Deploy EKS Cluster and App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: eu-west-2
      CLUSTER_NAME: our-eks-cluster
      ECR_REPO: nginx-app

    steps:
      # ---------------------------
      # Checkout Repo
      # ---------------------------
      - name: Checkout code
        uses: actions/checkout@v3

      # ---------------------------
      # Configure AWS CLI
      # ---------------------------
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # ---------------------------
      # Terraform Setup
      # ---------------------------
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve

      # ---------------------------
      # Configure kubectl
      # ---------------------------
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name $CLUSTER_NAME --region $AWS_REGION

      # ---------------------------
      # Deploy AWS Load Balancer Controller
      # ---------------------------
      - name: Deploy AWS Load Balancer Controller
        run: |
          kubectl apply -k "github.com/kubernetes-sigs/aws-load-balancer-controller//config/default?ref=v2.7.1"
          kubectl -n kube-system set env deployment/aws-load-balancer-controller \
            AWS_VPC_ID=$(aws ec2 describe-vpcs --region $AWS_REGION --query "Vpcs[0].VpcId" --output text) \
            AWS_REGION=$AWS_REGION \
            CLUSTER_NAME=$CLUSTER_NAME

      # ---------------------------
      # Build & Push Docker Image
      # ---------------------------
      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com

      - name: Build, Tag, and Push Image
        run: |
          docker build -t $ECR_REPO .
          docker tag $ECR_REPO:latest ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPO:latest
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPO:latest

      # ---------------------------
      # Deploy App + Ingress
      # ---------------------------
      - name: Deploy Kubernetes Manifests
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/ingress.yaml

      # ---------------------------
      # Get ALB Ingress URL
      # ---------------------------
      - name: Wait for Ingress & Get URL
        run: |
          echo "Waiting for ALB to provision..."
          sleep 120
          kubectl get ingress nginx-ingress -o jsonpath='{.status.loadBalancer.ingress[0].hostname}'
